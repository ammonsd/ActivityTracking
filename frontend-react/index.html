<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend-react</title>
    <script>
      /* If corporate proxy (Zscaler) blocks JS assets, redirect to Spring Boot UI.
         Plain <script> (not type="module") so Vite does not process or strip this
         during the production build. Must run before the React bundle loads. */
      (function() {
        fetch('/app/probe.js', { cache: 'no-store' })
          .then(function(r) {
            var ct = r.headers.get('content-type') || '';
            if (r.status !== 200 || ct.includes('text/html')) {
              globalThis.location.replace('/task-activity');
            }
          })
          .catch(function() { globalThis.location.replace('/task-activity'); });
      }());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# ========================================
# AWS Deployment Configuration
# Spring Boot Profile: aws
# ========================================
# This configuration is used when deploying to AWS ECS/Fargate
# Activate with: SPRING_PROFILES_ACTIVE=aws

# ========================================
# Server Configuration
# ========================================
server.port=8080
server.servlet.context-path=/

# ========================================
# Database Configuration
# ========================================
# Database credentials are loaded from AWS Secrets Manager
# The SecretsEnvironmentPostProcessor automatically handles secret loading
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/AmmoP1DB}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL initialization in AWS (rely on Hibernate DDL)
spring.sql.init.mode=never

# ========================================
# Connection Pool Optimization for AWS
# ========================================
# Optimized for AWS RDS with Fargate
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ========================================
# CORS Configuration
# ========================================
# Set via environment variable: CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
# Default to localhost for safety if not set
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ========================================
# Logging Configuration
# ========================================
# CloudWatch-compatible logging levels
logging.level.root=INFO
logging.level.com.ammons.taskactivity=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern for CloudWatch
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# Actuator/Health Check Configuration
# ========================================
# Required for AWS ALB health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ========================================
# Security Configuration
# ========================================
# Secure session cookies for production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# ========================================
# AWS Secrets Manager Configuration
# ========================================
# These are used by SecretsEnvironmentPostProcessor
AWS_SECRET_NAME=${AWS_SECRET_NAME:taskactivity/database/credentials}
AWS_REGION=${AWS_REGION:us-east-1}

# ========================================
# Admin User Configuration
# ========================================
# Default admin credentials (override via environment variables in production)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:ChangeMe123!}

# Application Properties for Task Activity Management API - Docker Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=8192
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Security Configuration - Spring Security enabled for Docker
# Removed exclusion to enable comprehensive security features

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# PostgreSQL database configuration for Docker
# Using host.docker.internal to connect to PostgreSQL on host machine
spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/AmmoP1DB
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Configuration - Update schema without deleting existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Spring Boot SQL Initialization
# Hibernate handles table creation (ddl-auto=update)
# Use data.sql for seed/reference data if needed
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
spring.jpa.defer-datasource-initialization=true
# spring.sql.init.continue-on-error=false

# Database connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
# Max lifetime set to 20 minutes to avoid PostgreSQL idle connection timeouts
spring.datasource.hikari.max-lifetime=1200000

# Logging Configuration
# Available log levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF
logging.level.com.example.taskactivity=DEBUG
logging.level.com.ammons.taskactivity=DEBUG
logging.level.com.ammons.taskactivity.config.DataInitializer=INFO
logging.level.com.ammons.taskactivity.service.CustomUserDetailsService=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.web.authentication=DEBUG
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File logging configured in logback-spring.xml (writes to C:/Logs/ActivityTracking-yyyy-MM-dd.log)

# Application Configuration
spring.application.name=Task Activity Management API

# JSON Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.property-naming-strategy=SNAKE_CASE

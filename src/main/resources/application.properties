# Application Properties for Task Activity Management API

# Server Configuration
server.port=8080
server.address=0.0.0.0
spring.devtools.add-properties=false
spring.devtools.restart.enabled=false
server.servlet.context-path=/
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=8192
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Security Configuration - Spring Security enabled for production
# Removed security exclusions to enable comprehensive authentication and authorization

# CORS Configuration - For local network access, uncomment and update IP if needed
# cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://192.168.198.39:8080

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# PostgreSQL database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/AmmoP1DB
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Spring Boot SQL Initialization
# Note: schema.sql is optional - Hibernate handles table creation
# Use data.sql for inserting seed/reference data
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# Database connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
# Max lifetime set to 20 minutes to avoid PostgreSQL idle connection timeouts
# Should be shorter than PostgreSQL's idle_in_transaction_session_timeout
spring.datasource.hikari.max-lifetime=1200000

# Logging Configuration
logging.level.com.ammons.taskactivity=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.security=WARN

# Application Configuration
spring.application.name=Task Activity Management API

# JSON Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
spring.jackson.property-naming-strategy=SNAKE_CASE

# Task Activity List Sort Configuration
# Controls the default sort order for the task activity list
# Valid values for direction: ASC (ascending) or DESC (descending)
app.task-activity.list.sort.date-direction=DESC
app.task-activity.list.sort.client-direction=ASC
app.task-activity.list.sort.project-direction=ASC

